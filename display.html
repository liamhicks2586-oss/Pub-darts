<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 PUB DARTS TV - Live Scoreboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Arial', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        .tv-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px;
            gap: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        .tv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(90deg, #1a1a2e 0%, #0066cc 50%, #1a1a2e 100%);
            border-bottom: 4px solid #00ff00;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 255, 0, 0.2);
        }

        .tv-logo {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(90deg, #00ff00, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 255, 0, 0.5); }
            50% { text-shadow: 0 0 40px rgba(0, 255, 0, 0.8); }
        }

        .tv-branding {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #ffaa00;
            text-transform: uppercase;
        }

        .live-badge {
            background: #ff0000;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 14px;
            animation: pulse 1s infinite;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            flex: 1;
            padding: 20px;
            background: rgba(10, 10, 10, 0.8);
            border: 3px solid #00ff00;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3), inset 0 0 40px rgba(0, 255, 0, 0.1);
        }

        .player-section {
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a1a2e 0%, #0066cc 50%, #1a1a2e 100%);
            padding: 30px;
            border-radius: 12px;
            border: 3px solid #00ccff;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 102, 204, 0.3);
        }

        .player-section.active {
            background: linear-gradient(135deg, #003d7a 0%, #00ff00 50%, #003d7a 100%);
            border-color: #00ff00;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5), inset 0 0 20px rgba(0, 255, 0, 0.2);
            transform: scale(1.02);
        }

        .player-label {
            font-size: 16px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .player-name {
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .score-display {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 12px;
            color: #00ccff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .score-number {
            font-size: 64px;
            font-weight: 900;
            color: #ffcc00;
            line-height: 1;
            text-shadow: 0 4px 12px rgba(255, 204, 0, 0.5);
        }

        .current-score {
            font-size: 36px;
            font-weight: 900;
            color: #00ff00;
            margin-top: 16px;
            text-shadow: 0 4px 12px rgba(0, 255, 0, 0.5);
        }

        .current-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .turn-indicator {
            grid-column: 1 / -1;
            background: linear-gradient(90deg, transparent, #00ff00, transparent);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: #000;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: turnPulse 1s ease-in-out infinite;
        }

        @keyframes turnPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .match-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            background: rgba(0, 102, 204, 0.2);
            border: 2px solid #0066cc;
            border-radius: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: #00ff00;
        }

        .tv-footer {
            text-align: center;
            padding: 16px;
            border-top: 2px solid #00ff00;
            font-size: 12px;
            color: #aaa;
            letter-spacing: 1px;
        }

        @media (max-aspect-ratio: 4/3) {
            .tv-container {
                padding: 20px;
                gap: 15px;
            }

            .scoreboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .player-name {
                font-size: 32px;
            }

            .score-number {
                font-size: 48px;
            }

            .current-score {
                font-size: 28px;
            }

            .tv-logo {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="tv-container">
        <div class="tv-header">
            <div class="tv-logo">🎯 PUB DARTS</div>
            <div class="tv-branding">LIVE SCOREBOARD</div>
            <div class="live-badge">● LIVE</div>
        </div>

        <div class="scoreboard">
            <div class="player-section active" id="player1Section">
                <div class="player-label">Player 1</div>
                <div class="player-name" id="p1Name">Player 1</div>
                
                <div class="score-display">
                    <div class="score-box">
                        <div class="score-label">Total Score</div>
                        <div class="score-number" id="p1Score">501</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">This Throw</div>
                        <div class="current-score" id="p1Current">0</div>
                        <div class="current-label">Points</div>
                    </div>
                </div>
            </div>

            <div class="player-section" id="player2Section">
                <div class="player-label">Player 2</div>
                <div class="player-name" id="p2Name">Player 2</div>
                
                <div class="score-display">
                    <div class="score-box">
                        <div class="score-label">Total Score</div>
                        <div class="score-number" id="p2Score">501</div>
                    </div>
                    <div class="score-box">
                        <div class="score-label">This Throw</div>
                        <div class="current-score" id="p2Current">0</div>
                        <div class="current-label">Points</div>
                    </div>
                </div>
            </div>

            <div class="turn-indicator" id="turnIndicator">Player 1's Turn</div>
        </div>

        <div class="match-info">
            <div class="stat">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="gameStatus">Ready</div>
            </div>
            <div class="stat">
                <div class="stat-label">Last Updated</div>
                <div class="stat-value" id="lastUpdate">--:--</div>
            </div>
        </div>

        <div class="tv-footer">
            🎯 PUB DARTS LIVE SCOREBOARD | REAL-TIME UPDATES | POWERED BY GITHUB PAGES
        </div>
    </div>

    <script>
        function updateScoreDisplay(gameState) {
            if (!gameState) return;

            document.getElementById('p1Name').textContent = gameState.player1.name;
            document.getElementById('p1Score').textContent = gameState.player1.score;
            document.getElementById('p1Current').textContent = gameState.player1.current;

            document.getElementById('p2Name').textContent = gameState.player2.name;
            document.getElementById('p2Score').textContent = gameState.player2.score;
            document.getElementById('p2Current').textContent = gameState.player2.current;

            const isPlayer1Active = gameState.currentPlayer === 1;
            document.getElementById('player1Section').classList.toggle('active', isPlayer1Active);
            document.getElementById('player2Section').classList.toggle('active', !isPlayer1Active);

            const playerName = isPlayer1Active ? gameState.player1.name : gameState.player2.name;
            document.getElementById('turnIndicator').textContent = `${playerName}'s Turn`;

            if (gameState.gameActive) {
                document.getElementById('gameStatus').textContent = 'IN PLAY';
            } else {
                document.getElementById('gameStatus').textContent = 'READY';
            }

            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('lastUpdate').textContent = `${hours}:${mins}`;
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'darts_gameState' && e.newValue) {
                updateScoreDisplay(JSON.parse(e.newValue));
            }
        });

        setInterval(() => {
            const stored = localStorage.getItem('darts_gameState');
            if (stored) {
                updateScoreDisplay(JSON.parse(stored));
            }
        }, 50);

        const stored = localStorage.getItem('darts_gameState');
        if (stored) {
            updateScoreDisplay(JSON.parse(stored));
        }
    </script>
</body>
</html>
