<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Pub Darts Display</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif}
    body{background:radial-gradient(circle at top,#112244 0%,#05070c 55%,#000 100%)}
    .screen{width:100vw;height:100vh;display:flex;flex-direction:column;padding:24px;gap:18px}
    .top{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,#111a33,#004aad,#111a33);border:3px solid #00ff00;border-radius:12px;padding:18px 22px;box-shadow:0 0 28px rgba(0,255,0,.18)}
    .brand{font-size:44px;font-weight:900;letter-spacing:2px;color:#00ff00;text-shadow:0 0 18px rgba(0,255,0,.6)}
    .live{background:#ff0000;color:#fff;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:900;letter-spacing:1px;animation:pulse 1s infinite}
    @keyframes pulse{50%{opacity:.55}}
    .board{flex:1;display:grid;grid-template-rows:1fr 1fr 120px;gap:18px;min-height:0}
    .player{display:flex;justify-content:space-between;align-items:center;padding:24px;border-radius:16px;background:linear-gradient(135deg,#141b2d,#083a7a);border:3px solid #2ea7ff;transition:.2s;box-shadow:0 0 22px rgba(0,102,204,.25)}
    .player.active{background:linear-gradient(135deg,#00315f,#0b7a1f);border-color:#00ff00;box-shadow:0 0 32px rgba(0,255,0,.32);transform:scale(1.01)}
    .name{font-size:40px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
    .scores{display:flex;gap:26px;align-items:center}
    .box{text-align:center;min-width:220px}
    .label{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:#b8d9ff;margin-bottom:6px}
    .score{font-size:96px;line-height:1;font-weight:900;color:#ffcc00;text-shadow:0 0 18px rgba(255,204,0,.35)}
    .small{font-size:34px;color:#00ff00}
    .turn{display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,transparent,#00ff00,transparent);color:#000;font-size:34px;font-weight:900;border-radius:14px;text-transform:uppercase;letter-spacing:3px}
    .status{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .card{background:rgba(16,24,42,.92);border:2px solid #2ea7ff;border-radius:12px;padding:16px;text-align:center}
    .card .label{margin-bottom:8px;color:#8cc7ff}
    .card .value{font-size:24px;font-weight:900;color:#00ff00}
    .hint{position:fixed;right:18px;bottom:18px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);padding:10px 12px;border-radius:10px;font-size:12px;color:#c9d7ff}
    @media (max-width: 1200px){
      .brand{font-size:32px}.name{font-size:30px}.score{font-size:72px}.small{font-size:28px}.box{min-width:170px}
    }
    @media (max-height: 720px){
      .screen{padding:16px;gap:12px}.top{padding:12px 16px}.player{padding:16px}.score{font-size:64px}.name{font-size:28px}.turn{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <div class="brand">🎯 PUB DARTS</div>
      <div class="live">● LIVE</div>
    </div>

    <div class="board">
      <div class="player active" id="p1Wrap">
        <div>
          <div class="name" id="p1Name">Player 1</div>
        </div>
        <div class="scores">
          <div class="box">
            <div class="label">Total Score</div>
            <div class="score" id="p1Score">501</div>
          </div>
          <div class="box">
            <div class="label">This Turn</div>
            <div class="score small" id="p1Current">0</div>
          </div>
        </div>
      </div>

      <div class="player" id="p2Wrap">
        <div>
          <div class="name" id="p2Name">Player 2</div>
        </div>
        <div class="scores">
          <div class="box">
            <div class="label">Total Score</div>
            <div class="score" id="p2Score">501</div>
          </div>
          <div class="box">
            <div class="label">This Turn</div>
            <div class="score small" id="p2Current">0</div>
          </div>
        </div>
      </div>

      <div class="turn" id="turnText">Player 1's Turn</div>
    </div>

    <div class="status">
      <div class="card">
        <div class="label">Status</div>
        <div class="value" id="statusText">Ready</div>
      </div>
      <div class="card">
        <div class="label">Last Update</div>
        <div class="value" id="timeText">--:--</div>
      </div>
    </div>
  </div>

  <div class="hint">Firestick-safe version: uses polling only</div>

  <script>
    let lastRaw = '';

    function render(s){
      if(!s) return;
      p1Name.textContent=s.player1.name;
      p2Name.textContent=s.player2.name;
      p1Score.textContent=s.player1.score;
      p2Score.textContent=s.player2.score;
      p1Current.textContent=s.player1.current;
      p2Current.textContent=s.player2.current;
      const p1=s.currentPlayer===1;
      p1Wrap.classList.toggle('active',p1);
      p2Wrap.classList.toggle('active',!p1);
      turnText.textContent=(p1?s.player1.name:s.player2.name)+"'s Turn";
      statusText.textContent=s.gameActive?'IN PLAY':'READY';
      const d=new Date();
      timeText.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    }

    function tick(){
      const raw=localStorage.getItem('darts_gameState')||'';
      if(raw && raw!==lastRaw){
        lastRaw=raw;
        try{ render(JSON.parse(raw)); }catch(e){}
      }
    }

    setInterval(tick, 50);
    tick();
  </script>
</body>
</html>
