<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pub Display - Darts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .display-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            background: #0a0a0a;
        }

        .camera-feed {
            position: relative;
            background: #1a1a2e;
            border-radius: 12px;
            border: 3px solid #00ff00;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .camera-label {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 20px;
            z-index: 10;
        }

        .camera-placeholder {
            text-align: center;
            color: #666;
        }

        .camera-placeholder p {
            font-size: 18px;
            margin: 10px 0;
        }

        .score-overlay {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.9);
            padding: 16px;
            border-radius: 8px;
            border: 2px solid #00ff00;
            z-index: 20;
        }

        .score-players {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .player-score {
            text-align: center;
        }

        .player-score .name {
            font-size: 18px;
            color: #00ccff;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .player-score .score {
            font-size: 48px;
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 4px;
        }

        .player-score .current {
            font-size: 16px;
            color: #00ff00;
            font-weight: bold;
        }

        .current-turn {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 14px;
            color: #ff6600;
            margin-top: 8px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @media (orientation: portrait) {
            .display-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .display-container {
                gap: 10px;
                padding: 10px;
            }

            .camera-label {
                font-size: 16px;
                padding: 6px 12px;
            }

            .score-overlay {
                padding: 12px;
                bottom: 12px;
                left: 12px;
                right: 12px;
            }

            .player-score .name {
                font-size: 14px;
            }

            .player-score .score {
                font-size: 36px;
            }

            .player-score .current {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="display-container">
        <!-- Camera 1: Dartboard -->
        <div class="camera-feed">
            <div class="camera-label">📍 DARTBOARD</div>
            <div class="camera-placeholder">
                <p>🎯</p>
                <p>Camera Feed 1</p>
                <p style="font-size: 12px; color: #999;">RTSP Stream</p>
            </div>
        </div>

        <!-- Camera 2: Thrower + Score Overlay -->
        <div class="camera-feed">
            <div class="camera-label">👤 THROWER</div>
            <div class="camera-placeholder">
                <p>🎲</p>
                <p>Camera Feed 2</p>
                <p style="font-size: 12px; color: #999;">RTSP Stream</p>
            </div>

            <!-- Score Overlay -->
            <div class="score-overlay" id="scoreOverlay">
                <div class="score-players">
                    <div class="player-score">
                        <div class="name" id="p1Name">Player 1</div>
                        <div class="score" id="p1Score">501</div>
                        <div class="current">Current: <span id="p1Current">0</span></div>
                    </div>
                    <div class="player-score">
                        <div class="name" id="p2Name">Player 2</div>
                        <div class="score" id="p2Score">501</div>
                        <div class="current">Current: <span id="p2Current">0</span></div>
                    </div>
                    <div class="current-turn" id="currentTurn">
                        Player 1's Turn
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let updateInterval = null;

        function initDisplay() {
            // Listen for storage changes
            window.addEventListener('storage', (e) => {
                if (e.key === 'darts_gameState') {
                    updateScoreDisplay(JSON.parse(e.newValue));
                }
            });

            // Poll for updates
            updateInterval = setInterval(() => {
                const stored = localStorage.getItem('darts_gameState');
                if (stored) {
                    updateScoreDisplay(JSON.parse(stored));
                }
            }, 500);

            // Initial update
            const stored = localStorage.getItem('darts_gameState');
            if (stored) {
                updateScoreDisplay(JSON.parse(stored));
            }
        }

        function updateScoreDisplay(gameState) {
            if (!gameState) return;

            document.getElementById('p1Name').textContent = gameState.player1.name;
            document.getElementById('p1Score').textContent = gameState.player1.score;
            document.getElementById('p1Current').textContent = gameState.player1.current;

            document.getElementById('p2Name').textContent = gameState.player2.name;
            document.getElementById('p2Score').textContent = gameState.player2.score;
            document.getElementById('p2Current').textContent = gameState.player2.current;

            const playerName = gameState.currentPlayer === 1 ? gameState.player1.name : gameState.player2.name;
            document.getElementById('currentTurn').textContent = `${playerName}'s Turn`;
        }

        window.addEventListener('DOMContentLoaded', initDisplay);
    </script>
</body>
</html>
